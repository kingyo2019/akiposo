<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>あきぽそのWebサイト</title>
    <style>
        body {
            background-color: #d2e9ff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            color: #333;
            user-select: none;
        }

        h1 {
            margin: 0;
            font-size: 32px;
            color: #222;
        }

        .subtitle {
            margin: 5px 0 20px 0;
            font-size: 16px;
            color: #555;
        }

        .main-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            max-width: 900px;
            width: 100%;
            justify-content: center;
        }

        /* 左側：UFOキャッチャーエリア */
        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .ufo-catcher {
            width: 400px;
            height: 400px;
            border: 3px solid #333;
            background-color: #fff;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        /* クレーン */
        .crane-rod {
            position: absolute;
            top: 0;
            left: 75px; /* 初期位置 */
            width: 4px;
            height: 40px;
            background-color: #333;
            transition: left 0.1s linear, height 0.1s linear;
        }

        .crane-claw {
            position: absolute;
            top: 40px;
            left: 55px;
            width: 44px;
            height: 30px;
            border: 3px solid #333;
            border-bottom: none;
            border-radius: 20px 20px 0 0;
            transition: left 0.1s linear, top 0.1s linear;
        }

        /* 出口 */
        .exit-box {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 80px;
            height: 80px;
            background-color: #ccc;
            border-top: 3px solid #333;
            border-left: 3px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #555;
        }

        /* 景品共通 */
        .prize {
            position: absolute;
            bottom: 0;
            width: 60px;
            height: 60px;
            border: 3px solid #333;
            border-radius: 50%;
            cursor: pointer;
        }
        .prize::before, .prize::after {
            content: '';
            position: absolute;
            top: -15px;
            width: 20px;
            height: 25px;
            border: 3px solid #333;
            border-bottom: none;
            border-radius: 10px 10px 0 0;
        }
        .prize-orange { left: 20px; background-color: #ff9f43; }
        .prize-orange::before { left: 5px; background-color: #ff9f43; }
        .prize-orange::after { right: 5px; background-color: #ff9f43; }

        .prize-green { left: 100px; background-color: #1dd1a1; }
        .prize-green::before { left: 5px; background-color: #1dd1a1; border-radius: 50% 50% 0 0; }
        .prize-green::after { right: 5px; background-color: #1dd1a1; border-radius: 50% 50% 0 0; }

        .prize-pink { left: 180px; background-color: #ff6b6b; }
        .prize-pink::before { left: 2px; height: 35px; top: -25px; background-color: #ff6b6b; }
        .prize-pink::after { right: 2px; height: 35px; top: -25px; background-color: #ff6b6b; }

        /* コントローラー */
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 15px;
        }

        .btn {
            border: 3px solid #333;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            background-color: #fff;
            box-shadow: 0 4px 0 #333;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        .btn-arrow { width: 60px; height: 50px; border-radius: 25px; }
        .btn-action { background-color: #fff799; padding: 10px 30px; }

        /* 右側：パネルエリア */
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 320px;
        }

        .panel-box {
            background-color: #fff;
            border: 3px solid #333;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 6px 0 rgba(0,0,0,0.1);
            text-align: center;
        }

        .btn-cal-toggle {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            font-weight: bold;
            background-color: #fff;
            border: 3px solid #333;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 0 #333;
        }
        .btn-cal-toggle:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .time-display {
            font-size: 18px;
            font-family: monospace;
            font-weight: bold;
            color: #2980b9;
        }

        .visitor-text {
            font-size: 18px;
            margin-bottom: 15px;
        }
        .counter-num {
            background-color: #ff7675;
            color: white;
            padding: 2px 8px;
            border: 2px solid #333;
            font-weight: bold;
            display: inline-block;
            margin: 0 5px;
        }

        .link-style {
            color: #0984e3;
            text-decoration: underline;
            cursor: pointer;
            margin: 10px 0;
            display: block;
            font-weight: bold;
        }

        /* 紙吹雪ボタンエリア */
        .confetti-controls {
            margin-top: 25px;
            display: flex;
            gap: 15px;
        }
        .btn-confetti {
            background-color: #fff;
            border: 3px solid #333;
            border-radius: 5px;
            padding: 8px 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #333;
        }
        .btn-confetti:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* モーダル（ポップアップの共通設定） */
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: white;
            border: 4px solid #333;
            border-radius: 15px;
            padding: 20px;
            z-index: 100;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 320px;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 99;
        }

        /* カレンダーの見た目 */
        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .cal-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
        }
        .cal-day-head { font-weight: bold; font-size: 12px; padding-bottom: 5px;}
        .cal-day {
            padding: 5px;
            font-size: 14px;
            border-radius: 3px;
        }
        .cal-today { background-color: #ff7675; color: white; font-weight: bold;}

        /* コメント欄・日記の入力 */
        .modal textarea {
            width: 93%;
            height: 100px;
            margin-top: 10px;
            padding: 8px;
            border: 2px solid #333;
            border-radius: 5px;
            resize: none;
        }
        .modal-close-btn {
            margin-top: 10px;
            width: 100%;
            padding: 8px;
            background-color: #eee;
            border: 2px solid #333;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        /* 紙吹雪の要素アニメーション */
        .confetti-piece {
            position: fixed;
            top: -20px;
            z-index: 999;
            animation: fall linear forwards;
        }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <h1>あきぽそのWebサイト</h1>
    <div class="subtitle">～ ノーコードでつくられています ～</div>

    <div class="main-container">
        <!-- 左側 -->
        <div class="game-area">
            <div class="ufo-catcher">
                <div class="crane-rod" id="craneRod"></div>
                <div class="crane-claw" id="craneClaw"></div>
                
                <div class="prize prize-orange" id="prize1"></div>
                <div class="prize prize-green" id="prize2"></div>
                <div class="prize prize-pink" id="prize3"></div>

                <div class="exit-box">出口</div>
            </div>
            <div class="controls">
                <button class="btn btn-arrow" id="btnLeft">◁</button>
                <button class="btn btn-action" id="btnCatch">つかむ</button>
                <button class="btn btn-arrow" id="btnRight">▷</button>
            </div>
        </div>

        <!-- 右側 -->
        <div class="side-panel">
            <button class="btn-cal-toggle" onclick="openModal('calModal')">📅 カレンダー表示</button>
            
            <div class="panel-box time-display" id="clock">0000/00/00 00:00:00</div>
            
            <div class="panel-box">
                <div class="visitor-text">あなたは <span class="counter-num">1</span> 人目の訪問者です</div>
                <div class="link-style" onclick="openModal('commentModal')">💬 訪問者のコメント欄</div>
                <div class="link-style" onclick="openModal('diaryModal')">📖 あきぽその日記</div>
            </div>
        </div>
    </div>

    <!-- 紙吹雪ボタン -->
    <div class="confetti-controls">
        <button class="btn-confetti" onclick="createConfetti('heart')">紙ふぶき (♥)</button>
        <button class="btn-confetti" onclick="createConfetti('star')">紙ふぶき (★)</button>
        <button class="btn-confetti" onclick="createConfetti('square')">紙ふぶき (■)</button>
    </div>

    <!-- 各種ポップアップ（モーダル） -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeAllModals()"></div>

    <!-- カレンダー用 -->
    <div class="modal" id="calModal">
        <div class="cal-header">
            <button class="cal-btn" onclick="changeMonth(-1)">◀</button>
            <span id="calTitle" style="font-weight: bold; font-size: 18px;">2026年 7月</span>
            <button class="cal-btn" onclick="changeMonth(1)">▶</button>
        </div>
        <div class="cal-grid" id="calGrid"></div>
        <button class="modal-close-btn" onclick="closeAllModals()">閉じる</button>
    </div>

    <!-- コメント欄用 -->
    <div class="modal" id="commentModal">
        <h3>💬 訪問者のコメント欄</h3>
        <textarea id="commentInput" placeholder="コメントを残してね！"></textarea>
        <button class="modal-close-btn" onclick="saveComment()">保存して閉じる</button>
    </div>

    <!-- 日記用 -->
    <div class="modal" id="diaryModal">
        <h3>📖 あきぽその日記</h3>
        <textarea id="diaryInput" placeholder="今日の日記を書こう！"></textarea>
        <button class="modal-close-btn" onclick="saveDiary()">保存して閉じる</button>
    </div>

    <script>
        // --- 1. 時計と訪問者カウンター ---
        function updateClock() {
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${y}/${m}/${d} ${hh}:${mm}:${ss}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- 2. モーダル管理 & データ保存 ---
        function openModal(id) {
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById(id).style.display = 'block';
            if(id === 'calModal') renderCalendar();
        }
        function closeAllModals() {
            document.getElementById('modalOverlay').style.display = 'none';
            const modals = document.querySelectorAll('.modal');
            modals.forEach(m => m.style.display = 'none');
        }
        // ローカルストレージにテキストを保存
        document.getElementById('commentInput').value = localStorage.getItem('web_comment') || '';
        document.getElementById('diaryInput').value = localStorage.getItem('web_diary') || '';
        function saveComment() {
            localStorage.setItem('web_comment', document.getElementById('commentInput').value);
            closeAllModals();
        }
        function saveDiary() {
            localStorage.setItem('web_diary', document.getElementById('diaryInput').value);
            closeAllModals();
        }

        // --- 3. カレンダー機能（左右の三角マークでめくれる） ---
        let currentCalDate = new Date();
        function renderCalendar() {
            const year = currentCalDate.getFullYear();
            const month = currentCalDate.getMonth();
            document.getElementById('calTitle').textContent = `${year}年 ${month + 1}月`;
            
            const grid = document.getElementById('calGrid');
            grid.innerHTML = '';
            
            // 曜日ヘッダー
            const days = ['日', '月', '火', '水', '木', '金', '土'];
            days.forEach(d => {
                const h = document.createElement('div');
                h.className = 'cal-day-head';
                h.textContent = d;
                grid.appendChild(h);
            });

            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            const today = new Date();

            // 空白埋め
            for(let i=0; i<firstDay; i++) {
                grid.appendChild(document.createElement('div'));
            }
            // 日付埋め
            for(let date=1; date<=lastDate; date++) {
                const dDiv = document.createElement('div');
                dDiv.className = 'cal-day';
                dDiv.textContent = date;
                if(year === today.getFullYear() && month === today.getMonth() && date === today.getDate()) {
                    dDiv.classList.add('cal-today');
                }
                grid.appendChild(dDiv);
            }
        }
        function changeMonth(offset) {
            currentCalDate.setMonth(currentCalDate.getMonth() + offset);
            renderCalendar();
        }

        // --- 4. 紙吹雪機能 (ハート、星、四角) ---
        function createConfetti(type) {
            const colors = ['#ff7675', '#fdcb6e', '#00cec9', '#6c5ce7', '#e84393', '#55efc4'];
            for (let i = 0; i < 30; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + 'vw';
                piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
                piece.style.animationDelay = (Math.random() * 0.5) + 's';
                piece.style.fontSize = (Math.random() * 15 + 15) + 'px';
                piece.style.color = colors[Math.floor(Math.random() * colors.length)];
                
                if (type === 'heart') {
                    piece.innerHTML = '♥';
                } else if (type === 'star') {
                    piece.innerHTML = '★';
                } else {
                    // 四角はテキストではなく■かスタイルで表現
                    piece.innerHTML = '■';
                }
                document.body.appendChild(piece);
                setTimeout(() => piece.remove(), 4000);
            }
        }

        // --- 5. ユーホーキャッチャーのロジック ---
        let craneX = 75; 
        let isPlaying = false;
        const rod = document.getElementById('craneRod');
        const claw = document.getElementById('craneClaw');
        
        // 景品オブジェクト
        const prizes = [
            { id: 'prize1', initX: 20, x: 20, y: 0, element: document.getElementById('prize1') },
            { id: 'prize2', initX: 100, x: 100, y: 0, element: document.getElementById('prize2') },
            { id: 'prize3', initX: 180, x: 180, y: 0, element: document.getElementById('prize3') }
        ];

        // 左右ボタンの動作
        document.getElementById('btnLeft').addEventListener('click', () => {
            if (isPlaying) return;
            craneX = Math.max(15, craneX - 20);
            updateCranePosition();
        });
        document.getElementById('btnRight').addEventListener('click', () => {
            if (isPlaying) return;
            craneX = Math.min(335, craneX + 20);
            updateCranePosition();
        });

        function updateCranePosition() {
            rod.style.left = craneX + 'px';
            claw.style.left = (craneX - 20) + 'px';
        }

        // 「つかむ」ボタンの動作
        document.getElementById('btnCatch').addEventListener('click', () => {
            if (isPlaying) return;
            isPlaying = true;
            
            let height = 40;
            let descending = true;
            let caughtPrize = null;

            // アニメーションループ
            const interval = setInterval(() => {
                if (descending) {
                    height += 8;
                    if (height >= 300) {
                        descending = false; // 最下点に到達
                        // つかむ判定 (クレーンの中心位置と景品の位置を比較)
                        const craneCenter = craneX;
                        prizes.forEach(p => {
                            if (Math.abs((p.x + 30) - craneCenter) < 35 && p.y === 0) {
                                caughtPrize = p;
                            }
                        });
                    }
                } else {
                    height -= 8;
                    if (caughtPrize) {
                        // 景品を一緒に持ち上げる
                        caughtPrize.y = (340 - height);
                        caughtPrize.element.style.bottom = caughtPrize.y + 'px';
                    }
                    if (height <= 40) {
                        clearInterval(interval);
                        // 戻る動作へ移行
                        moveToExit(caughtPrize);
                    }
                }
                rod.style.height = height + 'px';
                claw.style.top = height + 'px';
            }, 20);
        });

        // 出口へ移動する動作
        function moveToExit(caughtPrize) {
            const exitX = 335; // 出口の上（クレーンのX座標ベース）
            const interval = setInterval(() => {
                if (craneX < exitX) {
                    craneX = Math.min(exitX, craneX + 5);
                } else {
                    craneX = Math.max(exitX, craneX - 5);
                }
                updateCranePosition();
                
                if (caughtPrize) {
                    caughtPrize.x = craneX - 35; // クレーンに合わせて追従
                    caughtPrize.element.style.left = caughtPrize.x + 'px';
                }

                if (craneX === exitX) {
                    clearInterval(interval);
                    // 景品を落とす
                    if (caughtPrize) {
                        dropPrize(caughtPrize);
                    } else {
                        isPlaying = false;
                    }
                }
            }, 20);
        }

        // 景品を出口に落とし、その後自然に元の位置に戻す
        function dropPrize(prize) {
            let currentY = prize.y;
            const interval = setInterval(() => {
                currentY -= 10;
                if (currentY <= 0) {
                    currentY = 0;
                    clearInterval(interval);
                    
                    // 出口に到達したら、1秒後に自然に元の位置へリセットされる
                    setTimeout(() => {
                        prize.x = prize.initX;
                        prize.y = 0;
                        prize.element.style.left = prize.initX + 'px';
                        prize.element.style.bottom = '0px';
                        isPlaying = false;
                    }, 1000);
                }
                prize.element.style.bottom = currentY + 'px';
            }, 20);
        }
    </script>
</body>
</html>
