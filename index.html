<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>あきぽそそのWebサイト</title>
    <style>
        /* 全体のリセットと背景 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(180deg, #b3e5fc 0%, #e1f5fe 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* 波の背景エフェクト */
        .wave-bg {
            position: absolute;
            font-size: 4rem;
            color: rgba(255, 255, 255, 0.4);
            user-select: none;
            z-index: 0;
        }
        .wave-left { top: 20%; left: 5%; }
        .wave-right { top: 25%; right: 5%; }

        /* トビウオのアニメーション */
        .flying-fish {
            position: absolute;
            font-size: 2.5rem;
            user-select: none;
            z-index: 1;
        }
        .fish-left {
            top: 28%;
            left: 7%;
            animation: jumpFishLeft 4s infinite ease-in-out;
        }
        .fish-right {
            top: 33%;
            right: 7%;
            animation: jumpFishRight 4.5s infinite ease-in-out;
            transform: scaleX(-1);
        }

        @keyframes jumpFishLeft {
            0% { transform: translate(0, 40px) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            40% { transform: translate(40px, -60px) rotate(-20deg); }
            70% { transform: translate(80px, 40px) rotate(30deg); opacity: 1; }
            80%, 100% { transform: translate(80px, 40px); opacity: 0; }
        }
        @keyframes jumpFishRight {
            0% { transform: scaleX(-1) translate(0, 40px) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            40% { transform: scaleX(-1) translate(40px, -50px) rotate(-20deg); }
            70% { transform: scaleX(-1) translate(80px, 40px) rotate(30deg); opacity: 1; }
            80%, 100% { transform: scaleX(-1) translate(80px, 40px); opacity: 0; }
        }

        /* ヘッダーエリア */
        header {
            text-align: center;
            margin-top: 2rem;
            z-index: 10;
        }
        h1 {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            font-size: 1.1rem;
            color: #666;
        }

        /* メインレイアウト */
        .main-content {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            gap: 40px;
            margin: 2rem auto;
            max-width: 800px;
            width: 100%;
            position: relative;
        }

        /* ゲームエリア */
        .game-layout {
            position: relative;
            width: 360px;
        }

        .game-container {
            width: 100%;
            height: 400px;
            border: 4px solid #444;
            background-color: #fff;
            border-radius: 10px;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            z-index: 10;
            overflow: hidden;
        }

        /* クレーン（アーム） */
        .crane {
            position: absolute;
            top: 0;
            left: 20px;
            width: 60px;
            height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 15;
            transition: left 0.1s linear, height 0.5s ease-in-out;
        }
        .crane-rod {
            width: 4px;
            flex-grow: 1;
            min-height: 40px;
            background-color: #444;
        }
        .crane-claw-box {
            width: 40px;
            height: 25px;
            border: 3px solid #444;
            border-bottom: none;
            border-radius: 10px 10px 0 0;
            position: relative;
            background-color: #fff;
        }
        .crane-claw-box::before, .crane-claw-box::after {
            content: '';
            position: absolute;
            bottom: -10px;
            width: 3px;
            height: 12px;
            background-color: #444;
            transition: transform 0.3s;
        }
        .crane-claw-box.open::before { left: 0; transform: rotate(-40deg); }
        .crane-claw-box.open::after { right: 0; transform: rotate(40deg); }
        .crane-claw-box.close::before { left: 4px; transform: rotate(5deg); }
        .crane-claw-box.close::after { right: 4px; transform: rotate(-5deg); }

        /* 景品（ぬいぐるみ）エリア */
        .prize-floor {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            z-index: 12;
        }

        /* ぬいぐるみ共通スタイル */
        .plush {
            width: 55px;
            height: 50px;
            border: 3px solid #444;
            border-radius: 50% 50% 45% 45%;
            position: absolute;
            bottom: 0;
            transition: transform 0.1s, bottom 0.5s ease-in-out, left 0.5s ease-in-out, opacity 0.5s;
        }

        /* くまの耳 */
        .bear::before, .bear::after {
            content: '';
            position: absolute;
            top: -8px;
            width: 16px;
            height: 16px;
            background-color: inherit;
            border: 3px solid #444;
            border-radius: 50%;
            z-index: -1;
        }
        .bear::before { left: -4px; }
        .bear::after { right: -4px; }

        /* うさぎの耳 */
        .rabbit::before, .rabbit::after {
            content: '';
            position: absolute;
            top: -24px;
            width: 12px;
            height: 28px;
            background-color: inherit;
            border: 3px solid #444;
            border-radius: 50% 50% 0 0;
            z-index: -1;
        }
        .rabbit::before { left: 6px; transform: rotate(-5deg); }
        .rabbit::after { right: 6px; transform: rotate(5deg); }
