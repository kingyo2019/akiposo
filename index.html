<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>あきぽそのWebサイト</title>
    <style>
        /* 全体のリセットと背景 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(180deg, #b3e5fc 0%, #e1f5fe 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* 波の背景エフェクト */
        .wave-bg {
            position: absolute;
            font-size: 4rem;
            color: rgba(255, 255, 255, 0.4);
            user-select: none;
            z-index: 0;
        }
        .wave-left { top: 20%; left: 5%; }
        .wave-right { top: 25%; right: 5%; }

        /* トビウオのアニメーション */
        .flying-fish {
            position: absolute;
            font-size: 2.5rem;
            user-select: none;
            z-index: 1;
        }
        .fish-left {
            top: 28%;
            left: 7%;
            animation: jumpFishLeft 4s infinite ease-in-out;
        }
        .fish-right {
            top: 33%;
            right: 7%;
            animation: jumpFishRight 4.5s infinite ease-in-out;
            transform: scaleX(-1);
        }

        @keyframes jumpFishLeft {
            0% { transform: translate(0, 40px) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            40% { transform: translate(40px, -60px) rotate(-20deg); }
            70% { transform: translate(80px, 40px) rotate(30deg); opacity: 1; }
            80%, 100% { transform: translate(80px, 40px); opacity: 0; }
        }
        @keyframes jumpFishRight {
            0% { transform: scaleX(-1) translate(0, 40px) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            40% { transform: scaleX(-1) translate(40px, -50px) rotate(-20deg); }
            70% { transform: scaleX(-1) translate(80px, 40px) rotate(30deg); opacity: 1; }
            80%, 100% { transform: scaleX(-1) translate(80px, 40px); opacity: 0; }
        }

        /* ヘッダーエリア */
        header {
            text-align: center;
            margin-top: 2rem;
            z-index: 10;
        }
        h1 {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            font-size: 1.1rem;
            color: #666;
        }

        /* メインレイアウト */
        .main-content {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            gap: 40px;
            margin: 2rem auto;
            max-width: 800px;
            width: 100%;
            position: relative;
        }

        /* ゲームエリア */
        .game-layout {
            position: relative;
            width: 360px;
        }

        .game-container {
            width: 100%;
            height: 400px;
            border: 4px solid #444;
            background-color: #fff;
            border-radius: 10px;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            z-index: 10;
            overflow: hidden;
        }

        /* クレーン（アーム） */
        .crane {
            position: absolute;
            top: 0;
            left: 20px;
            width: 60px;
            height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 15;
            transition: left 0.1s linear, height 0.5s ease-in-out;
        }
        .crane-rod {
            width: 4px;
            flex-grow: 1;
            min-height: 40px;
            background-color: #444;
        }
        .crane-claw-box {
            width: 40px;
            height: 25px;
            border: 3px solid #444;
            border-bottom: none;
            border-radius: 10px 10px 0 0;
            position: relative;
            background-color: #fff;
        }
        .crane-claw-box::before, .crane-claw-box::after {
            content: '';
            position: absolute;
            bottom: -10px;
            width: 3px;
            height: 12px;
            background-color: #444;
            transition: transform 0.3s;
        }
        .crane-claw-box.open::before { left: 0; transform: rotate(-40deg); }
        .crane-claw-box.open::after { right: 0; transform: rotate(40deg); }
        .crane-claw-box.close::before { left: 4px; transform: rotate(5deg); }
        .crane-claw-box.close::after { right: 4px; transform: rotate(-5deg); }

        /* 景品（ぬいぐるみ）エリア */
        .prize-floor {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            z-index: 12;
        }

        /* ぬいぐるみ共通スタイル */
        .plush {
            width: 55px;
            height: 50px;
            border: 3px solid #444;
            border-radius: 50% 50% 45% 45%;
            position: absolute;
            bottom: 0;
            transition: transform 0.1s;
        }

        /* くまの耳 */
        .bear::before, .bear::after {
            content: '';
            position: absolute;
            top: -8px;
            width: 16px;
            height: 16px;
            background-color: inherit;
            border: 3px solid #444;
            border-radius: 50%;
            z-index: -1;
        }
        .bear::before { left: -4px; }
        .bear::after { right: -4px; }

        /* うさぎの耳 */
        .rabbit::before, .rabbit::after {
            content: '';
            position: absolute;
            top: -24px;
            width: 12px;
            height: 28px;
            background-color: inherit;
            border: 3px solid #444;
            border-radius: 50% 50% 0 0;
            z-index: -1;
        }
        .rabbit::before { left: 6px; transform: rotate(-5deg); }
        .rabbit::after { right: 6px; transform: rotate(5deg); }

        /* 出口 */
        .exit-chute {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 75px;
            height: 120px;
            border-left: 4px solid #444;
            border-top: 4px solid #444;
            background-color: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 11;
        }
        .exit-label {
            font-size: 0.8rem;
            color: #666;
            font-weight: bold;
            writing-mode: vertical-rl;
        }

        /* 左下の操作ボタン */
        .control-panel {
            position: absolute;
            bottom: -55px;
            left: 0;
            display: flex;
            gap: 8px;
            align-items: center;
            z-index: 20;
        }
        .control-btn {
            padding: 6px 14px;
            font-size: 0.95rem;
            font-weight: bold;
            background-color: #fff;
            border: 3px solid #444;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 3px 0 #444;
            user-select: none;
        }
        .control-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #444;
        }
        .btn-grab {
            background-color: #fffbbf;
            padding: 6px 18px;
        }

        /* 右側：情報パネルエリア */
        .side-panel {
            width: 280px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        .info-card {
            background-color: #fff;
            border: 3px solid #444;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        /* カレンダー */
        .cal-btn {
            width: 100%;
            padding: 10px;
            font-size: 1rem;
            font-weight: bold;
            background-color: #e3f2fd;
            border: 3px solid #444;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 3px 0 #444;
        }
        .cal-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #444;
        }

        .calendar-container {
            margin-top: 10px;
            display: none;
            font-size: 0.85rem;
        }
        .calendar-header-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .calendar-header {
            font-weight: bold;
            color: #1565c0;
            font-size: 1rem;
        }
        .cal-arrow-btn {
            background: none;
            border: none;
            font-size: 1rem;
            color: #444;
            cursor: pointer;
            padding: 2px 8px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            gap: 2px;
        }
        .day-name { font-weight: bold; background: #eee; padding: 2px 0; }
        .calendar-day { padding: 4px 0; border-radius: 3px; }
        .today-highlight { background-color: #ff8a80; color: white; font-weight: bold; }

        /* 時計表示 */
        .datetime-display {
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            color: #333;
        }

        /* アクセスカウンター */
        .counter-box {
            text-align: center;
            font-size: 1rem;
            color: #444;
        }
        .counter-number {
            font-size: 1.5rem;
            font-weight: bold;
            color: #d81b60;
            background: #f8bbd0;
            padding: 2px 8px;
            border-radius: 4px;
            margin: 0 4px;
            border: 2px solid #444;
        }

        /* テキストリンク */
        .link-container {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-align: center;
        }
        .custom-link {
            font-size: 1rem;
            color: #0288d1;
            text-decoration: underline;
            cursor: pointer;
            font-weight: bold;
        }
        .custom-link:hover {
            color: #01579b;
        }

        /* ポップアップの共通スタイル */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.4);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background-color: #fff;
            border: 4px solid #444;
            border-radius: 12px;
            width: 90%;
            max-width: 450px;
            padding: 20px;
            box-sizing: border-box;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            font-weight: bold;
            color: #666;
        }
        .modal-title {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 3px solid #444;
            padding-bottom: 5px;
            color: #333;
        }

        /* コメント用パーツ */
        .warning-text {
            background-color: #ffebee;
            color: #c62828;
            border: 1px solid #ffcdd2;
            padding: 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 12px;
        }
        .input-group input, .input-group textarea {
            padding: 8px;
            border: 2px solid #444;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        .submit-btn {
            background-color: #4caf50;
            color: white;
            border: 2px solid #444;
            padding: 8px 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        .submit-btn:active { transform: scale(0.98); }
        
        .list-box {
            margin-top: 15px;
            border-top: 2px dashed #444;
            padding-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .item-post {
            background: #f9f9f9;
            border: 2px solid #ddd;
            border-radius: 6px;
            padding: 10px;
        }
        .item-meta {
            font-size: 0.75rem;
            color: #777;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }
        .item-body {
            font-size: 0.9rem;
            color: #333;
            white-space: pre-wrap;
        }

        /* 下部の紙ふぶきボタン */
        .button-area {
            display: flex;
            gap: 20px;
            margin-top: 5rem;
            margin-bottom: 3rem;
            z-index: 10;
        }
        .confetti-btn {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            color: #333;
            background-color: #fff;
            border: 3px solid #444;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px 0 #444;
        }
        .confetti-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #444;
        }

        /* 紙ふぶき用スタイル */
        .confetti-piece {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            z-index: 999;
            top: -20px;
            animation: fallAnimation 2.5s linear forwards;
        }
        @keyframes fallAnimation {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="wave-bg wave-left">〜<br>〜</div>
    <div class="flying-fish fish-left">🐟</div>
    <div class="wave-bg wave-right">〜</div>
    <div class="flying-fish fish-right">🐟</div>

    <header>
        <h1>あきぽそのWebサイト</h1>
        <div class="subtitle">〜 ノーコードでつくられています 〜</div>
    </header>

    <div class="main-content">
        
        <div class="game-layout">
            <div class="game-container" id="gameChamber">
                <div class="crane" id="crane">
                    <div class="crane-rod"></div>
                    <div class="crane-claw-box open" id="claw"></div>
                </div>
                <div class="prize-floor" id="prizeFloor">
                    <div class="plush bear" id="plush1" style="background-color: #ffb74d; left: 30px;"></div>
                    <div class="plush bear" id="plush2" style="background-color: #a5d6a7; left: 110px;"></div>
                    <div class="plush rabbit" id="plush3" style="background-color: #ff8a80; left: 190px;"></div>
                </div>
                <div class="exit-chute">
                    <span class="exit-label">出口</span>
                </div>
            </div>
            <div class="control-panel">
                <button class="control-btn" onclick="moveLeft()">◁</button>
                <button class="control-btn btn-grab" onclick="grabAction()">つかむ</button>
                <button class="control-btn" onclick="moveRight()">▷</button>
            </div>
        </div>

        <div class="side-panel">
            <div class="info-card">
                <button class="cal-btn" onclick="toggleCalendar()">📅 カレンダー表示</button>
                <div class="calendar-container" id="calendarBox">
                    <div class="calendar-header-wrapper">
                        <button class="cal-arrow-btn" onclick="prevMonth()">◀</button>
                        <div class="calendar-header" id="calHeader">2026年 7月</div>
                        <button class="cal-arrow-btn" onclick="nextMonth()">▶</button>
                    </div>
                    <div class="calendar-grid" id="calGrid"></div>
                </div>
            </div>

            <div class="info-card">
                <div class="datetime-display" id="liveClock">0000/00/00 00:00:00</div>
            </div>

            <div class="info-card">
                <div class="counter-box">
                    あなたは<span class="counter-number" id="visitorCount">0</span>人目の訪問者です
                </div>
                <div class="link-container">
                    <div class="custom-link" onclick="openModal('commentModal')">💬 訪問者のコメント欄</div>
                    <div class="custom-link" onclick="openModal('diaryModal')">📖 あきぽその日記</div>
                </div>
            </div>
        </div>

    </div>

    <div class="modal-overlay" id="commentModal" onclick="closeModal('commentModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeModal('commentModal')">&times;</span>
            <div class="modal-title">訪問者のコメント欄</div>
            <div class="warning-text">⚠️ 誹謗中傷や荒らしはやめてください</div>
            
            <div class="input-group">
                <input type="text" id="commentName" placeholder="ニックネーム">
            </div>
            <div class="input-group">
                <textarea id="commentText" rows="3" placeholder="コメントを入力（アメブロ風）..."></textarea>
            </div>
            <button class="submit-btn" onclick="addComment()">コメントを投稿する</button>

            <div class="list-box" id="commentList"></div>
        </div>
    </div>

    <div class="modal-overlay" id="diaryModal" onclick="closeModal('diaryModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeModal('diaryModal')">&times;</span>
            <div class="modal-title">あきぽその日記</div>
            
            <div class="input-group">
                <input type="text" id="diaryTitle" placeholder="日記のタイトル">
            </div>
            <div class="input-group">
                <textarea id="diaryText" rows="4" placeholder="今日の日記を書きましょう..."></textarea>
            </div>
            <button class="submit-btn" style="background-color: #0288d1;" onclick="addDiary()">日記を公開する</button>

            <div class="list-box" id="diaryList"></div>
        </div>
    </div>

    <div class="button-area">
        <button class="confetti-btn" onclick="celebrate()">紙ふぶき</button>
        <button class="confetti-btn" onclick="celebrate()">紙ふぶき</button>
        <button class="confetti-btn" onclick="celebrate()">紙ふぶき</button>
    </div>

    <script>
        // --- クレーンゲームのロジック ---
        let craneLeft = 20; 
        const crane = document.getElementById('crane');
        const claw = document.getElementById('claw');
        let isOperating = false;
        let grabbedItem = null;

        const initialPositions = [
            { id: 'plush1', left: 30 },
            { id: 'plush2', left: 110 },
            { id: 'plush3', left: 190 }
        ];

        function moveLeft() { if (isOperating) return; if (craneLeft > 10) { craneLeft -= 15; crane.style.left = craneLeft + 'px'; } }
        function moveRight() { if (isOperating) return; if (craneLeft < 240) { craneLeft += 15; crane.style.left = craneLeft + 'px'; } }

        function grabAction() {
            if (isOperating) return; isOperating = true;
            crane.style.height = '320px';
            setTimeout(() => {
                const armCenter = craneLeft + 30; 
                initialPositions.forEach(pos => {
                    const item = document.getElementById(pos.id);
                    if (item.style.display !== 'none') {
                        const itemLeft = pos.left; const itemRight = itemLeft + 55;
                        if (armCenter >= itemLeft - 10 && armCenter <= itemRight + 10) { grabbedItem = item; }
                    }
                });
                claw.classList.remove('open'); claw.classList.add('close');
                if (grabbedItem) { grabbedItem.style.bottom = '-15px'; grabbedItem.style.left = '2px'; crane.appendChild(grabbedItem); }
            }, 500);

            setTimeout(() => { crane.style.height = '80px'; }, 1200);
            setTimeout(() => { craneLeft = 285; crane.style.left = craneLeft + 'px'; }, 2000);
            setTimeout(() => {
                claw.classList.remove('close'); claw.classList.add('open');
                if (grabbedItem) {
                    const fallingItem = grabbedItem;
                    fallingItem.style.left = '287px'; fallingItem.style.bottom = '200px'; fallingItem.style.transition = 'bottom 0.5s ease-in';
                    document.getElementById('gameChamber').appendChild(fallingItem);
                    setTimeout(() => { fallingItem.style.bottom = '-60px'; }, 50);
                    setTimeout(() => {
                        fallingItem.style.transition = 'none'; fallingItem.style.bottom = '0px';
                        const origPos = initialPositions.find(p => p.id === fallingItem.id);
                        fallingItem.style.left = origPos.left + 'px';
                        document.getElementById('prizeFloor').appendChild(fallingItem);
                        setTimeout(() => { fallingItem.style.transition = ''; }, 100);
                        celebrate();
                    }, 1500);
                    grabbedItem = null;
                }
            }, 3200);
            setTimeout(() => { craneLeft = 20; crane.style.left = craneLeft + 'px'; isOperating = false; }, 4500);
        }

        // --- 時計の自動更新機能 ---
        function updateClock() {
            const now = new Date();
            const y = now.getFullYear(); const m = String(now.getMonth() + 1).padStart(2, '0'); const d = String(now.getDate()).padStart(2, '0');
            const hrs = String(now.getHours()).padStart(2, '0'); const min = String(now.getMinutes()).padStart(2, '0'); const sec = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('liveClock').innerText = `${y}/${m}/${d} ${hrs}:${min}:${sec}`;
        }
        setInterval(updateClock, 1000); updateClock();

        // --- カレンダーロジック ---
        const realDate = new Date(); let displayYear = realDate.getFullYear(); let displayMonth = realDate.getMonth();
        function toggleCalendar() {
            const box = document.getElementById('calendarBox');
            if (box.style.display === 'block') { box.style.display = 'none'; } 
            else { box.style.display = 'block'; displayYear = realDate.getFullYear(); displayMonth = realDate.getMonth(); generateCalendar(); }
        }
        function prevMonth() { displayMonth--; if (displayMonth < 0) { displayMonth = 11; displayYear--; } generateCalendar(); }
        function nextMonth() { displayMonth++; if (displayMonth > 11) { displayMonth = 0; displayYear++; } generateCalendar(); }
        function generateCalendar() {
            document.getElementById('calHeader').innerText = `${displayYear}年 ${displayMonth + 1}月`;
            const grid = document.getElementById('calGrid'); grid.innerHTML = ''; 
            const weekDays = ['日', '月', '火', '水', '木', '金', '土'];
            weekDays.forEach(wd => { const div = document.createElement('div'); div.classList.add('day-name'); div.innerText = wd; grid.appendChild(div); });
            const firstDay = new Date(displayYear, displayMonth, 1).getDay(); const totalDays = new Date(displayYear, displayMonth + 1, 0).getDate();
            for (let i = 0; i < firstDay; i++) { const empty = document.createElement('div'); grid.appendChild(empty); }
            for (let day = 1; day <= totalDays; day++) {
                const dayDiv = document.createElement('div'); dayDiv.classList.add('calendar-day'); dayDiv.innerText = day;
                if (day === realDate.getDate() && displayMonth === realDate.getMonth() && displayYear === realDate.getFullYear()) { dayDiv.classList.add('today-highlight'); }
                grid.appendChild(dayDiv);
            }
        }

        // --- 【修正】アクセスカウンター（0からスタートする設定） ---
        let currentCount = localStorage.getItem('site_counter') || 0;
        currentCount = parseInt(currentCount) + 1; localStorage.setItem('site_counter', currentCount);
        document.getElementById('visitorCount').innerText = currentCount.toLocaleString();

        // --- 紙ふぶきのロジック ---
        function celebrate() {
            const colors = ['#ff8a80', '#ffb74d', '#a5d6a7', '#80deea', '#b3e5fc', '#d1c4e9', '#ff80ab'];
            for (let i = 0; i < 35; i++) {
                const piece = document.createElement('div');
                piece.classList.add('confetti-piece');
                piece.style.left = Math.random() * 100 + 'vw';
                piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                const scale = Math.random() * 0.7 + 0.6;
                piece.style.transform = `scale(${scale})`;
                const delay = Math.random() * 0.3;
                piece.style.animationDelay = delay + 's';
                const duration = Math.random() * 1.2 + 1.8;
                piece.style.animationDuration = duration + 's';
                document.body.appendChild(piece);
                setTimeout(() => { piece.remove(); }, (delay + duration + 0.5) * 1000);
            }
        }

        // --- ポップアップ（コメント欄・日記）制御ロジック ---
        function openModal(id) {
            document.getElementById(id).style.display = 'flex';
            if (id === 'commentModal') loadComments();
            if (id === 'diaryModal') loadDiaries();
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function addComment() {
            const nameInput = document.getElementById('commentName');
            const textInput = document.getElementById('commentText');
            if (!textInput.value.trim()) return alert('コメントを入力してください');

            const comments = JSON.parse(localStorage.getItem('web_comments') || '[]');
            const newComment = {
                name: nameInput.value.trim() || '名無しさん',
                text: textInput.value,
                date: new Date().toLocaleString('ja-JP')
            };
            comments.unshift(newComment);
            localStorage.setItem('web_comments', JSON.stringify(comments));
            textInput.value = '';
            loadComments();
        }

        function loadComments() {
            const list = document.getElementById('commentList');
            const comments = JSON.parse(localStorage.getItem('web_comments') || '[]');
            if (comments.length === 0) {
                list.innerHTML = '<div style="color:#888; text-align:center; font-size:0.9rem;">コメントはまだありません。</div>';
                return;
            }
            list.innerHTML = comments.map(c => `
                <div class="item-post">
                    <div class="item-meta">
                        <strong>${escapeHTML(c.name)}</strong>
                        <span>${c.date}</span>
                    </div>
                    <div class="item-body">${escapeHTML(c.text)}</div>
                </div>
            `).join('');
        }

        function addDiary() {
            const titleInput = document.getElementById('diaryTitle');
            const textInput = document.getElementById('diaryText');
            if (!textInput.value.trim()) return alert('日記の本文を入力してください');

            const diaries = JSON.parse(localStorage.getItem('web_diaries') || '[]');
            const newDiary = {
                title: titleInput.value.trim() || '無題の日記',
                text: textInput.value,
                date: new Date().toLocaleDateString('ja-JP')
            };
            diaries.unshift(newDiary);
            localStorage.setItem('web_diaries', JSON.stringify(diaries));
            titleInput.value = ''; textInput.value = '';
            loadDiaries();
        }

        function loadDiaries() {
            const list = document.getElementById('diaryList');
            const diaries = JSON.parse(localStorage.getItem('web_diaries') || '[]');
            if (diaries.length === 0) {
                list.innerHTML = '<div style="color:#888; text-align:center; font-size:0.9rem;">日記はまだありません。</div>';
                return;
            }
            list.innerHTML = diaries.map(d => `
                <div class="item-post" style="border-left: 5px solid #0288d1;">
                    <div class="item-meta">
                        <strong style="color:#0288d1; font-size:1rem;">${escapeHTML(d.title)}</strong>
                        <span>${d.date}</span>
                    </div>
                    <div class="item-body" style="margin-top:5px;">${escapeHTML(d.text)}</div>
                </div>
            `).join('');
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag] || tag));
        }
    </script>
</body>
</html>
