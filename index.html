<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>あきぽそのWebサイト</title>
    <style>
        body {
            background-color: #cbeaff;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            margin: 0;
            color: #333;
            box-sizing: border-box;
        }

        h1 { margin: 10px 0 5px 0; font-size: 24px; text-align: center; }
        .subtitle { font-size: 13px; margin-bottom: 15px; color: #555; text-align: center; }

        /* 全体レイアウト（スマホでは縦並び、PCでは横並び） */
        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 540px;
        }

        @media (min-width: 560px) {
            .main-container {
                flex-direction: row;
                justify-content: center;
                align-items: flex-start;
            }
        }

        /* クレーンゲームエリア */
        .game-area { display: flex; flex-direction: column; align-items: center; }
        .screen {
            width: 300px; height: 300px; border: 3px solid #333; background-color: #fff;
            border-radius: 10px; position: relative; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* クレーン */
        .crane-rod {
            position: absolute; top: 0; left: 45px; width: 4px; height: 20px;
            background-color: #333; transition: left 0.1s linear, height 0.5s ease;
        }
        .crane-claw {
            position: absolute; top: 20px; left: 30px; width: 34px; height: 25px;
            border: 3px solid #333; border-bottom: none; border-radius: 15px 15px 0 0;
            transition: left 0.1s linear, top 0.5s ease;
        }
        .crane-claw::before, .crane-claw::after {
            content: ''; position: absolute; bottom: -8px; width: 3px; height: 10px; background-color: #333;
        }
        .crane-claw::before { left: -3px; border-radius: 0 0 0 5px; }
        .crane-claw::after { right: -3px; border-radius: 0 0 5px 0; }

        /* 景品と出口 */
        .exit {
            position: absolute; bottom: 0; right: 0; width: 60px; height: 70px;
            border-top: 3px solid #333; border-left: 3px solid #333; background-color: #e0e0e0;
            display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; color: #666;
        }
        .prize {
            position: absolute; bottom: 0; width: 46px; height: 46px; border: 3px solid #333;
            border-radius: 50%; transition: left 0.1s linear, bottom 0.5s ease;
        }
        .prize::before, .prize::after {
            content: ''; position: absolute; top: -10px; width: 14px; height: 14px; border: 3px solid #333; background-color: inherit;
        }
        .bear::before { left: -2px; border-radius: 50%; }
        .bear::after { right: -2px; border-radius: 50%; }
        .rabbit::before { left: 2px; height: 22px; top: -18px; border-radius: 10px 10px 0 0; }
        .rabbit::after { right: 2px; height: 22px; top: -18px; border-radius: 10px 10px 0 0; }

        #prize1 { background-color: #ffb03b; left: 20px; }
        #prize2 { background-color: #a1db97; left: 75px; }
        #prize3 { background-color: #ff7676; left: 130px; }

        .controls { margin-top: 15px; display: flex; gap: 10px; }
        .btn {
            background-color: #fff; border: 3px solid #333; border-radius: 20px;
            padding: 8px 15px; font-weight: bold; cursor: pointer; box-shadow: 0 3px 0 #333;
        }
        .btn:active { transform: translateY(3px); box-shadow: none; }
        .btn-yellow { background-color: #fff799; }

        /* 右側サイドバー（スマホでは横幅いっぱいにフィット） */
        .sidebar { display: flex; flex-direction: column; gap: 12px; width: 300px; }
        .panel { background-color: #fff; border: 3px solid #333; border-radius: 5px; padding: 10px; text-align: center; box-shadow: 0 4px 0 #333; box-sizing: border-box;}
        .panel-btn {
            width: 100%; background-color: #e6f2ff; border: 3px solid #333; border-radius: 5px;
            padding: 8px; font-weight: bold; cursor: pointer; box-shadow: 0 3px 0 #333; box-sizing: border-box;
        }
        .panel-btn:active { transform: translateY(3px); box-shadow: none; }
        .counter-num { background-color: #ffc0db; padding: 2px 8px; border: 2px solid #333; font-weight: bold; color: #d00060; margin: 0 5px; }
        .links { margin-top: 8px; display: flex; flex-direction: column; gap: 5px; font-size: 13px; }
        .links a { color: #0066cc; text-decoration: none; font-weight: bold; cursor: pointer; }

        /* コンテンツエリア（スマホ画面からはみ出さないよう調整） */
        .content-section {
            width: 100%; max-width: 540px; background-color: #fff; border: 3px solid #333;
            border-radius: 10px; padding: 15px; margin-top: 15px; box-shadow: 0 6px 0 #333; box-sizing: border-box;
        }
        .hidden { display: none; }
        
        /* 入力フォーム共通 */
        .form-style input, .form-style textarea {
            width: 100%; padding: 8px; margin-bottom: 10px; border: 2px solid #333; border-radius: 5px; box-sizing: border-box;
        }
        .list-style {
            margin-top: 15px; border-top: 2px dashed #333; padding-top: 10px; max-height: 250px; overflow-y: auto; text-align: left;
        }
        .item-style { background-color: #f9f9f9; border: 2px solid #333; border-radius: 5px; padding: 8px; margin-bottom: 8px; font-size: 14px; }
        .item-meta { font-size: 11px; color: #666; margin-bottom: 4px; }

        /* 📅 本格カレンダー用のCSSスタイル */
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .cal-btn { background: #fff; border: 2px solid #333; border-radius: 5px; cursor: pointer; padding: 2px 8px; font-weight: bold; }
        .cal-table { width: 100%; border-collapse: collapse; text-align: center; font-weight: bold; font-size: 14px; }
        .cal-table th { background-color: #f0f0f0; border: 2px solid #333; padding: 5px; }
        .cal-table td { border: 2px solid #333; padding: 5px; height: 35px; width: 14.2%; }
        .cal-sun { color: red; }
        .cal-sat { color: blue; }
        .cal-today { background-color: #ffeb3b; border: 3px solid #ff5722 !important; }

        /* 下部 紙ふぶき */
        .bottom-controls { display: flex; gap: 10px; margin-top: 15px; }
        .bottom-controls .panel-btn { width: 75px; padding: 6px; font-size: 12px; }
        .confetti { position: absolute; width: 10px; height: 10px; pointer-events: none; animation: fall 2s linear forwards; }
        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <h1>あきぽそのWebサイト</h1>
    <div class="subtitle">～ ノーコードでつくられています ～</div>

    <div class="main-container">
        <div class="game-area">
            <div class="screen" id="screen">
                <div class="crane-rod" id="craneRod"></div>
                <div class="crane-claw" id="craneClaw"></div>
                <div class="prize bear" id="prize1"></div>
                <div class="prize bear" id="prize2"></div>
                <div class="prize rabbit" id="prize3"></div>
                <div class="exit">出口</div>
            </div>
            <div class="controls">
                <button class="btn" id="moveLeft">◁</button>
                <button class="btn btn-yellow" id="catchBtn">つかむ</button>
                <button class="btn" id="moveRight">▷</button>
            </div>
        </div>

        <div class="sidebar">
            <button class="panel-btn" onclick="showCalendarSection()">📅 カレンダー表示</button>
            <div class="panel" id="clockDisplay">0000/00/00 00:00:00</div>
            <div class="panel">
                あなたは <span class="counter-num" id="visitorCount">0</span> 人目の訪問者です
                <div class="links">
                    <a onclick="showSection('commentSection')">💬 訪問者のコメント欄</a>
                    <a onclick="showSection('diarySection')">📖 あきぽその日記</a>
                </div>
            </div>
        </div>
    </div>

    <div id="calendarSection" class="content-section hidden">
        <div class="cal-header">
            <button class="cal-btn" onclick="changeMonth(-1)">＜ 先月</button>
            <h2 id="calendarTitle" style="margin: 0; font-size: 18px;">2026年7月</h2>
            <button class="cal-btn" onclick="changeMonth(1)">次月 ＞</button>
        </div>
        <table class="cal-table">
            <thead>
                <tr>
                    <th class="cal-sun">日</th>
                    <th>月</th>
                    <th>火</th>
                    <th>水</th>
                    <th>木</th>
                    <th>金</th>
                    <th class="cal-sat">土</th>
                </tr>
            </thead>
            <tbody id="calendarBody"></tbody>
        </table>
    </div>

    <div id="diarySection" class="content-section hidden">
        <h2 style="margin-top:0; font-size: 20px;">📖 あきぽその日記</h2>
        <div class="form-style" style="background-color: #fff4d4; padding: 10px; border: 2px dashed #ffb03b; border-radius: 5px; margin-bottom: 15px;">
            <strong style="font-size: 13px; color: #d87a00;">🛠️ 管理人メニュー：日記を書く</strong>
            <input type="text" id="diaryTitle" placeholder="日記のタイトル" style="margin-top: 5px;">
            <textarea id="diaryContent" rows="3" placeholder="今日の日記内容..."></textarea>
            <button class="panel-btn" style="background-color: #ffe082;" onclick="addDiary()">日記を公開する</button>
        </div>
        <div class="list-style" id="diaryList"></div>
    </div>

    <div id="commentSection" class="content-section hidden">
        <h2 style="margin-top:0; font-size: 20px;">💬 訪問者のコメント欄</h2>
        <div class="comment-form form-style">
            <input type="text" id="userName" placeholder="お名前（ニックネーム）">
            <textarea id="commentText" rows="3" placeholder="コメントを書いてね！"></textarea>
            <button class="panel-btn" onclick="addComment()">書き込む</button>
        </div>
        <div class="list-style" id="commentList"></div>
    </div>

    <div class="bottom-controls">
        <button class="panel-btn" onclick="createConfetti()">紙ふぶき</button>
        <button class="panel-btn" onclick="createConfetti()">紙ふぶき</button>
        <button class="panel-btn" onclick="createConfetti()">紙ふぶき</button>
    </div>

    <script>
        // --- 画面切り替え ---
        function showSection(sectionId) {
            document.getElementById('calendarSection').classList.add('hidden');
            document.getElementById('diarySection').classList.add('hidden');
            document.getElementById('commentSection').classList.add('hidden');
            
            document.getElementById(sectionId).classList.remove('hidden');
            document.getElementById(sectionId).scrollIntoView({ behavior: 'smooth' });
        }

        // --- 📅 カレンダーのロジック ---
        let currentYear = 2026;
        let currentMonth = 6;

        function showCalendarSection() {
            const today = new Date();
            currentYear = today.getFullYear();
            currentMonth = today.getMonth();
            renderCalendar(currentYear, currentMonth);
            showSection('calendarSection');
        }

        function changeMonth(direction) {
            currentMonth += direction;
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            else if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            renderCalendar(currentYear, currentMonth);
        }

        function renderCalendar(year, month) {
            document.getElementById('calendarTitle').textContent = `${year}年 ${month + 1}月`;
            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            const today = new Date();
            const tbody = document.getElementById('calendarBody');
            tbody.innerHTML = '';
            
            let date = 1;
            for (let i = 0; i < 6; i++) {
                let row = document.createElement('tr');
                for (let j = 0; j < 7; j++) {
                    let cell = document.createElement('td');
                    if (i === 0 && j < firstDay) {
                        row.appendChild(cell);
                    } else if (date > lastDate) {
                        if(j === 0) break;
                        row.appendChild(cell);
                    } else {
                        cell.textContent = date;
                        if (j === 0) cell.classList.add('cal-sun');
                        if (j === 6) cell.classList.add('cal-sat');
                        if (date === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
                            cell.classList.add('cal-today');
                        }
                        row.appendChild(cell);
                        date++;
                    }
                }
                if (row.children.length > 0) tbody.appendChild(row);
                if (date > lastDate) break;
            }
        }

        // --- 🔢 アクセスカウンター機能 ---
        let count = parseInt(localStorage.getItem('visitorCount')) || 0;
        count++;
        localStorage.setItem('visitorCount', count);
        document.getElementById('visitorCount').textContent = count;

        // --- 📖 日記のロジック ---
        function getNowString() {
            const now = new Date();
            return `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        }

        function loadDiaries() {
            const diaries = JSON.parse(localStorage.getItem('myDiaries')) || [
                { title: "ついにサイト開設！", content: "ノーコードで作ってたホームページだけど、ちょっと本気出してゲームとか動くようにしてみたよ！", time: "2026/07/11 23:00" }
            ];
            const list = document.getElementById('diaryList');
            list.innerHTML = '';
            diaries.forEach(diary => {
                const item = document.createElement('div');
                item.classList.add('item-style');
                item.innerHTML = `
                    <div class="item-meta">投稿日時: ${diary.time}</div>
                    <strong style="font-size:15px; display:block; margin-bottom:5px;">${diary.title}</strong>
                    <div>${diary.content}</div>
                `;
                list.appendChild(item);
            });
        }

        function addDiary() {
            const titleInput = document.getElementById('diaryTitle');
            const contentInput = document.getElementById('diaryContent');
            const title = titleInput.value.trim() || '無題の日記';
            const content = contentInput.value.trim();
            if (!content) { alert('日記の内容を入力してください！'); return; }

            const diaries = JSON.parse(localStorage.getItem('myDiaries')) || [];
            diaries.unshift({ title, content, time: getNowString() });
            localStorage.setItem('myDiaries', JSON.stringify(diaries));
            titleInput.value = ''; contentInput.value = '';
            loadDiaries();
        }

        // --- 💬 コメントのロジック ---
        function loadComments() {
            const comments = JSON.parse(localStorage.getItem('myComments')) || [
                { name: "名無しさん", text: "クレーンゲームめっちゃ楽しいです！緑のクマが全然取れない！笑", time: "2026/07/11 23:00" }
            ];
            const list = document.getElementById('commentList');
            list.innerHTML = '';
            comments.forEach(comment => {
                const item = document.createElement('div');
                item.classList.add('item-style');
                item.innerHTML = `
                    <div class="item-meta">${comment.name} - ${comment.time}</div>
                    <div>${comment.text}</div>
                `;
                list.appendChild(item);
            });
        }

        function addComment() {
            const nameInput = document.getElementById('userName');
            const textInput = document.getElementById('commentText');
            const name = nameInput.value.trim() || '名無しさん';
            const text = textInput.value.trim();
            if (!text) { alert('コメントを入力してください！'); return; }

            const comments = JSON.parse(localStorage.getItem('myComments')) || [];
            comments.unshift({ name, text, time: getNowString() });
            localStorage.setItem('myComments', JSON.stringify(comments));
            textInput.value = '';
            loadComments();
        }

        loadDiaries();
        loadComments();

        // --- 時計の機能 ---
        function updateClock() {
            const now = new Date();
            const y = now.getFullYear(); const m = String(now.getMonth() + 1).padStart(2, '0'); const d = String(now.getDate()).padStart(2, '0');
            const h = String(now.getHours()).padStart(2, '0'); const min = String(now.getMinutes()).padStart(2, '0'); const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clockDisplay').textContent = `${y}/${m}/${d} ${h}:${min}:${s}`;
        }
        setInterval(updateClock, 1000); updateClock();

        // --- クレーンゲームのロジック ---
        const craneRod = document.getElementById('craneRod'); const craneClaw = document.getElementById('craneClaw');
        const prizes = [
            { el: document.getElementById('prize1'), x: 20, caught: false },
            { el: document.getElementById('prize2'), x: 75, caught: false },
            { el: document.getElementById('prize3'), x: 130, caught: false }
        ];
        let craneX = 30; let isAnimating = false;

        document.getElementById('moveLeft').addEventListener('click', () => { if (!isAnimating) { craneX = Math.max(0, craneX - 15); updateCranePosition(); } });
        document.getElementById('moveRight').addEventListener('click', () => { if (!isAnimating) { craneX = Math.min(240, craneX + 15); updateCranePosition(); } });
        function updateCranePosition() { craneClaw.style.left = craneX + 'px'; craneRod.style.left = (craneX + 15) + 'px'; }

        document.getElementById('catchBtn').addEventListener('click', () => {
            if (isAnimating) return; isAnimating = true;
            craneClaw.style.top = '230px'; craneRod.style.height = '230px';

            setTimeout(() => {
                const clawCenter = craneX + 17; let targetPrize = null;
                prizes.forEach(prize => {
                    if (!prize.caught) { const prizeCenter = prize.x + 23; if (Math.abs(clawCenter - prizeCenter) < 25) targetPrize = prize; }
                });
                craneClaw.style.top = '20px'; craneRod.style.height = '20px';

                if (targetPrize) {
                    targetPrize.el.style.bottom = '210px';
                    let upInterval = setInterval(() => { if(!isAnimating) clearInterval(upInterval); targetPrize.el.style.left = (craneX - 3) + 'px'; }, 20);

                    setTimeout(() => {
                        craneX = 240; updateCranePosition();
                        setTimeout(() => {
                            clearInterval(upInterval);
                            targetPrize.el.style.transition = 'bottom 0.5s ease-in, left 0.1s linear'; targetPrize.el.style.left = '245px'; targetPrize.el.style.bottom = '-60px'; targetPrize.caught = true;
                            setTimeout(() => { alert('景品をゲットしました！'); isAnimating = false; targetPrize.el.style.transition = 'left 0.1s linear, bottom 0.5s ease'; }, 500);
