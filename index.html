<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>あきぽそそのWebサイト</title>
    <style>
        :root {
            --primary: #ff7675;
            --secondary: #74b9ff;
            --accent: #ffeaa7;
            --bg: #f5f6fa;
            --text: #2d3436;
        }

        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: var(--primary); margin-bottom: 20px; }
        .container { width: 100%; max-width: 600px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* 隠すクラス */
        .admin-only { display: none; }

        .fish-container { display: flex; justify-content: space-between; width: 100%; max-width: 500px; height: 60px; margin-bottom: 20px; }
        .fish { font-size: 2rem; animation: jump 2s ease-in-out infinite; }
        .fish-right { animation-delay: 1s; }
        @keyframes jump { 0%, 100% { transform: translateY(20px); } 50% { transform: translateY(-10px); } }

        .counter-box { text-align: center; font-size: 1.2rem; margin-bottom: 15px; font-weight: bold; }
        .counter-box span { color: var(--primary); font-size: 2rem; }
        
        button { background-color: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; width: 100%; margin-bottom: 10px; font-weight: bold; }
        button.secondary { background-color: var(--secondary); }

        .list-item { border-bottom: 1px solid #eee; padding: 15px 0; position: relative; }
        .delete-btn { background-color: #ff7675; color: white; border: none; padding: 3px 8px; font-size: 0.75rem; border-radius: 5px; cursor: pointer; display: inline-block; margin-top: 5px; }

        .confetti { position: fixed; z-index: 9999; top: -20px; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(105vh) rotate(720deg); } }
    </style>
</head>
<body>

    <h1>あきぽそのWebサイト</h1>

    <div class="fish-container">
        <span class="fish">🐟</span>
        <span class="fish fish-right">🐟</span>
    </div>

    <div class="container">
        <div class="counter-box">あなたは <span id="visitor-count">1</span> 人目の訪問者です！</div>
        <button id="confetti-btn" class="secondary">🎉 紙ふぶきを降らせる</button>
    </div>

    <div class="container">
        <h2>📖 あきぽその日記</h2>
        <!-- 管理者のみ表示 -->
        <div id="diary-form" class="admin-only">
            <textarea id="diary-input" style="width:100%; height:80px; margin-bottom:10px;"></textarea>
            <button id="diary-btn">日記を投稿する</button>
        </div>
        <div id="diary-list"></div>
    </div>

    <div class="container">
        <h2>💬 足あと・コメント</h2>
        <input type="text" id="comment-name" placeholder="お名前" style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box;">
        <textarea id="comment-input" style="width:100%; height:80px; margin-bottom:10px; box-sizing:border-box;"></textarea>
        <button id="comment-btn" class="secondary">コメントを残す</button>
        <div id="comment-list"></div>
    </div>

    <!-- 管理用ログインボタン -->
    <div style="margin-top: 20px;">
        <button id="login-btn" style="background:none; color:#aaa; font-size:0.8rem;">管理者ログイン</button>
    </div>

    <script>
        const ADMIN_PASSWORD = "1234"; // パスワード

        // ログイン状態を確認してUIを切り替え
        function checkAdmin() {
            if (sessionStorage.getItem('isAdmin') === 'true') {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
                document.getElementById('login-btn').style.display = 'none';
            }
        }

        // 管理者ログイン
        document.getElementById('login-btn').addEventListener('click', () => {
            const pass = prompt("管理者パスワードを入力してください：");
            if (pass === ADMIN_PASSWORD) {
                sessionStorage.setItem('isAdmin', 'true');
                checkAdmin();
            } else {
                alert("パスワードが違います");
            }
        });

        // 訪問者カウンター（前回の続き）
        let count = parseInt(localStorage.getItem('visitor_count') || 1);
        if (sessionStorage.getItem('counted') !== 'true') {
            count++;
            localStorage.setItem('visitor_count', count);
            sessionStorage.setItem('counted', 'true');
        }
        document.getElementById('visitor-count').textContent = count;

        // 紙ふぶき処理
        const shapes = ['square', 'heart', 'star'];
        const colors = ['#ff7675', '#74b9ff', '#ffeaa7', '#55efc4', '#a29bfe', '#fd79a8'];
        document.getElementById('confetti-btn').addEventListener('click', () => {
            for (let i = 0; i < 80; i++) {
                const el = document.createElement('div');
                el.className = 'confetti';
                const shape = shapes[Math.floor(Math.random() * shapes.length)];
                if (shape === 'square') { el.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)]; el.style.width = '10px'; el.style.height = '10px'; }
                else { el.innerHTML = (shape === 'heart' ? '❤️' : '★'); el.style.fontSize = '15px'; }
                el.style.left = Math.random() * 100 + 'vw';
                el.style.animationDuration = Math.random() * 2 + 2 + 's';
                document.body.appendChild(el);
                el.addEventListener('animationend', () => el.remove());
            }
        });

        // データ管理
        let diaries = JSON.parse(localStorage.getItem('diaries')) || [];
        let comments = JSON.parse(localStorage.getItem('comments')) || [];

        function render() {
            const dList = document.getElementById('diary-list');
            dList.innerHTML = '';
            diaries.forEach((item, index) => {
                dList.innerHTML += `<div class="list-item"><div>${item.date}</div><div>${item.text}</div><button class="delete-btn admin-only" onclick="delD(${index})">削除</button></div>`;
            });
            const cList = document.getElementById('comment-list');
            cList.innerHTML = '';
            comments.forEach((item, index) => {
                cList.innerHTML += `<div class="list-item"><div>${item.date} - ${item.name}</div><div>${item.isDeleted ? '<em>このコメントは削除されました</em>' : item.text}</div>${!item.isDeleted ? `<button class="delete-btn admin-only" onclick="delC(${index})">削除</button>` : ''}</div>`;
            });
            checkAdmin(); // 再表示時に管理権限チェック
        }

        document.getElementById('diary-btn').onclick = () => {
            const text = document.getElementById('diary-input').value;
            if(!text) return;
            const now = new Date();
            diaries.unshift({ date: now.toLocaleString(), text });
            localStorage.setItem('diaries', JSON.stringify(diaries));
            render();
            document.getElementById('diary-input').value = '';
        };

        document.getElementById('comment-btn').onclick = () => {
            const name = document.getElementById('comment-name').value || '名無しさん';
            const text = document.getElementById('comment-input').value;
            if(!text) return;
            comments.unshift({ date: new Date().toLocaleString(), name, text, isDeleted: false });
            localStorage.setItem('comments', JSON.stringify(comments));
            render();
            document.getElementById('comment-input').value = '';
        };

        window.delD = (i) => { diaries.splice(i, 1); localStorage.setItem('diaries', JSON.stringify(diaries)); render(); };
        window.delC = (i) => { comments[i].isDeleted = true; localStorage.setItem('comments', JSON.stringify(comments)); render(); };

        render();
    </script>
</body>
</html>
